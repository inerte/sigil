name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-${{ github.sha }}
  cancel-in-progress: false

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: version
        name: Compute release version
        shell: bash
        run: |
          commit_epoch="$(git show -s --format=%ct "$GITHUB_SHA")"
          version="$(date -u -d "@${commit_epoch}" +"%Y-%m-%dT%H-%M-%SZ")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Create release tag
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if git rev-parse -q --verify "refs/tags/${VERSION}" >/dev/null; then
            echo "Tag ${VERSION} already exists"
            exit 0
          fi

          git tag "${VERSION}" "$GITHUB_SHA"
          git push origin "refs/tags/${VERSION}"

  build-binaries:
    needs:
      - prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            runner: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - platform: darwin-x64
            runner: macos-14
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
          - platform: linux-x64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - platform: windows-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6

      - name: Select compatible macOS toolchain
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "DEVELOPER_DIR=/Applications/Xcode_16.2.app/Contents/Developer" >> "$GITHUB_ENV"

      - name: Pin macOS deployment target
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "MACOSX_DEPLOYMENT_TARGET=14.5" >> "$GITHUB_ENV"

      - name: Show macOS compiler
        if: runner.os == 'macOS'
        shell: bash
        run: |
          /usr/bin/xcodebuild -version
          /usr/bin/clang++ --version | head -n 1

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Prepare prebuilt Z3
        if: runner.os != 'Windows'
        shell: bash
        run: |
          z3_version="4.15.4"
          case "${{ matrix.target }}" in
            aarch64-apple-darwin)
              z3_asset="z3-${z3_version}-arm64-osx-13.7.6.zip"
              ;;
            x86_64-apple-darwin)
              z3_asset="z3-${z3_version}-x64-osx-13.7.6.zip"
              ;;
            aarch64-unknown-linux-gnu)
              z3_asset="z3-${z3_version}-arm64-glibc-2.34.zip"
              ;;
            x86_64-unknown-linux-gnu)
              z3_asset="z3-${z3_version}-x64-glibc-2.39.zip"
              ;;
            *)
              echo "unsupported Z3 target: ${{ matrix.target }}" >&2
              exit 1
              ;;
          esac

          z3_root="${RUNNER_TEMP}/z3"
          z3_static_dir="${RUNNER_TEMP}/z3-static-lib"
          rm -rf "${z3_root}" "${z3_static_dir}"
          mkdir -p "${z3_root}" "${z3_static_dir}"
          curl -L --fail "https://github.com/Z3Prover/z3/releases/download/z3-${z3_version}/${z3_asset}" -o "${RUNNER_TEMP}/z3.zip"
          unzip -q "${RUNNER_TEMP}/z3.zip" -d "${z3_root}"
          cp "${z3_root}"/*/bin/libz3.a "${z3_static_dir}/libz3.a"
          echo "Z3_LIBRARY_PATH_OVERRIDE=${z3_static_dir}" >> "$GITHUB_ENV"

      - name: Install system Z3
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install z3 --version=4.16.0 -y
          $chocoRoot = if ($env:ChocolateyInstall) { $env:ChocolateyInstall } else { Join-Path $env:ProgramData "chocolatey" }
          $z3Root = Join-Path $chocoRoot "lib\\z3\\tools\\bin"
          $z3LibDir = Join-Path $z3Root "bin"
          if (!(Test-Path (Join-Path $z3LibDir "libz3.lib"))) {
            throw "expected libz3.lib in $z3LibDir"
          }
          if (!(Test-Path (Join-Path $z3LibDir "libz3.dll"))) {
            throw "expected libz3.dll in $z3LibDir"
          }
          Add-Content -Path $env:GITHUB_ENV -Value "Z3_LIBRARY_PATH_OVERRIDE=$z3LibDir"
          Add-Content -Path $env:GITHUB_ENV -Value "Z3_RUNTIME_DIR=$z3LibDir"
          Add-Content -Path $env:GITHUB_PATH -Value $z3LibDir

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            language/compiler/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-dist-z3-archive-${{ hashFiles('language/compiler/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-dist-z3-archive-

      - name: Build release binary
        if: runner.os != 'Windows'
        env:
          SIGIL_VERSION: ${{ needs.prepare-release.outputs.version }}
        run: cargo build --locked --profile dist --manifest-path language/compiler/Cargo.toml -p sigil-cli --target ${{ matrix.target }} --no-default-features

      - name: Build release binary
        if: runner.os == 'Windows'
        env:
          SIGIL_VERSION: ${{ needs.prepare-release.outputs.version }}
        run: cargo build --locked --profile dist --manifest-path language/compiler/Cargo.toml -p sigil-cli --target ${{ matrix.target }} --no-default-features

      - name: Smoke test binary
        if: runner.os != 'Windows'
        env:
          SIGIL_VERSION: ${{ needs.prepare-release.outputs.version }}
        shell: bash
        run: |
          binary="language/compiler/target/${{ matrix.target }}/dist/sigil"
          if [[ "${{ matrix.target }}" == "x86_64-apple-darwin" ]]; then
            /usr/sbin/softwareupdate --install-rosetta --agree-to-license >/dev/null 2>&1 || true
            version="$(arch -x86_64 "$binary" --version)"
          else
            version="$("$binary" --version)"
          fi
          test "$version" = "sigil ${SIGIL_VERSION}"

      - name: Package unix archive
        if: runner.os != 'Windows'
        env:
          SIGIL_VERSION: ${{ needs.prepare-release.outputs.version }}
        shell: bash
        run: |
          base="sigil-${SIGIL_VERSION}-${{ matrix.platform }}"
          stage_dir="dist/${base}"
          mkdir -p "${stage_dir}"
          cp "language/compiler/target/${{ matrix.target }}/dist/sigil" "${stage_dir}/sigil"
          cp LICENSE "${stage_dir}/LICENSE"
          printf "Sigil %s\n\nRun ./sigil --help\n" "${SIGIL_VERSION}" > "${stage_dir}/README.txt"
          tar -C dist -czf "dist/${base}.tar.gz" "${base}"

      - name: Smoke test binary
        if: runner.os == 'Windows'
        env:
          SIGIL_VERSION: ${{ needs.prepare-release.outputs.version }}
        shell: pwsh
        run: |
          $binary = "language/compiler/target/${{ matrix.target }}/dist/sigil.exe"
          $version = & $binary --version
          if ($version -ne "sigil $env:SIGIL_VERSION") {
            throw "unexpected version output: $version"
          }

      - name: Package windows archive
        if: runner.os == 'Windows'
        env:
          SIGIL_VERSION: ${{ needs.prepare-release.outputs.version }}
        shell: pwsh
        run: |
          $base = "sigil-$env:SIGIL_VERSION-${{ matrix.platform }}"
          $stageDir = "dist/$base"
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null
          Copy-Item "language/compiler/target/${{ matrix.target }}/dist/sigil.exe" "$stageDir/sigil.exe"
          Copy-Item "$env:Z3_RUNTIME_DIR/*.dll" $stageDir
          Copy-Item "LICENSE" "$stageDir/LICENSE"
          Set-Content -Path "$stageDir/README.txt" -Value "Sigil $env:SIGIL_VERSION`n`nRun .\\sigil.exe --help"
          Compress-Archive -Path $stageDir -DestinationPath "dist/$base.zip" -Force

      - uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.platform }}
          path: dist/*.${{ matrix.archive_ext }}
          compression-level: 0

  publish-release:
    needs:
      - prepare-release
      - build-binaries
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum sigil-* > SHA256SUMS

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          if gh release view "${VERSION}" --repo "${REPO}" >/dev/null 2>&1; then
            gh release upload "${VERSION}" dist/* --clobber --repo "${REPO}"
          else
            gh release create "${VERSION}" dist/* --title "${VERSION}" --latest --generate-notes --repo "${REPO}"
          fi

  publish-homebrew-tap:
    needs:
      - prepare-release
      - build-binaries
      - publish-release
    runs-on: ubuntu-latest
    env:
      HOMEBREW_TAP_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}

    steps:
      - name: Check tap publish configuration
        id: tap-config
        shell: bash
        run: |
          if [[ -n "${HOMEBREW_TAP_DEPLOY_KEY}" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Homebrew tap deploy key not configured; skipping tap publish."
          fi

      - uses: actions/checkout@v6
        if: ${{ steps.tap-config.outputs.configured == 'true' }}

      - uses: actions/download-artifact@v8
        if: ${{ steps.tap-config.outputs.configured == 'true' }}
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - uses: actions/setup-node@v6
        if: ${{ steps.tap-config.outputs.configured == 'true' }}
        with:
          node-version: 24

      - name: Enable corepack pnpm
        if: ${{ steps.tap-config.outputs.configured == 'true' }}
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@10.0.0 --activate

      - name: Install workspace dependencies
        if: ${{ steps.tap-config.outputs.configured == 'true' }}
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Generate checksums
        if: ${{ steps.tap-config.outputs.configured == 'true' }}
        shell: bash
        run: |
          cd dist
          sha256sum sigil-* > SHA256SUMS

      - name: Extract Sigil release binary
        if: ${{ steps.tap-config.outputs.configured == 'true' }}
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/sigil-release"
          tar -xzf "dist/sigil-${VERSION}-linux-x64.tar.gz" -C "$RUNNER_TEMP/sigil-release"
          echo "SIGIL_BIN=$(find "$RUNNER_TEMP/sigil-release" -name sigil -type f | head -1)" >> "$GITHUB_ENV"

      - name: Generate Homebrew formula
        if: ${{ steps.tap-config.outputs.configured == 'true' }}
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/homebrew/Formula"
          sigilHomebrewVersion="${VERSION}" \
          sigilHomebrewRepo="${REPO}" \
          sigilHomebrewSha256SumsPath="$PWD/dist/SHA256SUMS" \
          sigilHomebrewOutputPath="$RUNNER_TEMP/homebrew/Formula/sigil.rb" \
          "$SIGIL_BIN" run projects/homebrewPackaging/src/main.sigil --env release
          ruby -c "$RUNNER_TEMP/homebrew/Formula/sigil.rb"

      - name: Configure tap deploy key
        if: ${{ steps.tap-config.outputs.configured == 'true' }}
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf "%s" "$HOMEBREW_TAP_DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Update tap repo
        if: ${{ steps.tap-config.outputs.configured == 'true' }}
        env:
          TAP_REPO: inerte/homebrew-tap
          VERSION: ${{ needs.prepare-release.outputs.version }}
        shell: bash
        run: |
          git clone "git@github.com:${TAP_REPO}.git" "$RUNNER_TEMP/homebrew-tap"
          mkdir -p "$RUNNER_TEMP/homebrew-tap/Formula"
          cp "$RUNNER_TEMP/homebrew/Formula/sigil.rb" "$RUNNER_TEMP/homebrew-tap/Formula/sigil.rb"
          cd "$RUNNER_TEMP/homebrew-tap"
          if [[ -z "$(git status --porcelain -- Formula/sigil.rb)" ]]; then
            echo "Homebrew formula already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/sigil.rb
          git commit -m "update: publish sigil ${VERSION} formula"
          git push
