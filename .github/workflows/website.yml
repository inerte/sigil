name: website

on:
  pull_request:
    paths:
      - ".node-version"
      - ".github/workflows/website.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "package.json"
      - "pnpm-lock.yaml"
      - "language/compiler/**"
      - "language/docs/**"
      - "language/spec/**"
      - "projects/ssg/**"
      - "projects/game-2048/**"
      - "projects/flashcards/**"
      - "projects/minesweep/**"
      - "projects/todo-app/**"
      - "website/**"
  push:
    branches:
      - main
    paths:
      - ".node-version"
      - ".github/workflows/website.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "package.json"
      - "pnpm-lock.yaml"
      - "language/compiler/**"
      - "language/docs/**"
      - "language/spec/**"
      - "projects/ssg/**"
      - "projects/game-2048/**"
      - "projects/flashcards/**"
      - "projects/minesweep/**"
      - "projects/todo-app/**"
      - "website/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-site:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1

      - name: Install system Z3
        run: |
          sudo apt-get update
          sudo apt-get install -y libz3-dev pkg-config

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: true

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-website-system-z3-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-website-system-z3-

      - name: Enable corepack pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@10.0.0 --activate

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Sigil CLI
        run: cargo build --quiet -p sigil-cli --no-default-features

      - name: Test SSG helpers
        run: cargo run -q -p sigil-cli --no-default-features -- test projects/ssg/tests

      - name: Build React demos
        env:
          sigilSiteBasePath: /${{ github.event.repository.name }}/
        shell: bash
        run: |
          cargo run -q -p sigil-cli --no-default-features -- compile projects/todo-app/src/todoDomain.lib.sigil -o projects/todo-app/web/src/generated/todo-domain.ts
          (
            cd projects/todo-app
            SIGIL_TODO_BASE=${sigilSiteBasePath:-/}projects/sigil-todo/demo/ pnpm exec vite build
          )

          cargo run -q -p sigil-cli --no-default-features -- compile projects/minesweep/src/minesweepDomain.lib.sigil -o projects/minesweep/web/src/generated/minesweep-domain.ts
          mkdir -p projects/minesweep/web/src/generated/core
          cp projects/minesweep/.local/core/prelude.ts projects/minesweep/web/src/generated/core/prelude.ts
          (
            cd projects/minesweep
            SIGIL_MINESWEEP_BASE=${sigilSiteBasePath:-/}projects/sigil-minesweep/demo/ pnpm exec vite build
          )

          cargo run -q -p sigil-cli --no-default-features -- compile projects/game-2048/src/game2048.lib.sigil -o projects/game-2048/web/src/generated/game-2048.ts
          mkdir -p projects/game-2048/web/src/generated/core
          cp projects/game-2048/.local/core/prelude.ts projects/game-2048/web/src/generated/core/prelude.ts
          (
            cd projects/game-2048
            SIGIL_2048_BASE=${sigilSiteBasePath:-/}projects/sigil-2048/demo/ pnpm exec vite build
          )

          cargo run -q -p sigil-cli --no-default-features -- compile projects/flashcards/src/flashcardsDomain.lib.sigil -o projects/flashcards/web/src/generated/flashcards-domain.ts
          mkdir -p projects/flashcards/web/src/generated/core
          cp projects/flashcards/.local/core/prelude.ts projects/flashcards/web/src/generated/core/prelude.ts
          (
            cd projects/flashcards
            SIGIL_FLASHCARDS_BASE=${sigilSiteBasePath:-/}projects/sigil-flashcards/demo/ pnpm exec vite build
          )

      - name: Build website
        env:
          sigilSiteBasePath: /${{ github.event.repository.name }}/
          sigilSiteRepoUrl: https://github.com/${{ github.repository }}
        run: cargo run -q -p sigil-cli --no-default-features -- run projects/ssg/src/main.sigil --env site

      - name: Verify site output
        run: |
          test -f website/.local/site/index.html
          test -f website/.local/site/articles/index.html
          test -f website/.local/site/docs/index.html
          test -f website/.local/site/projects/index.html
          test -f website/.local/site/projects/sigil-2048/index.html
          test -f website/.local/site/projects/sigil-2048/demo/index.html
          test -f website/.local/site/projects/sigil-flashcards/index.html
          test -f website/.local/site/projects/sigil-flashcards/demo/index.html
          test -f website/.local/site/projects/sigil-minesweep/index.html
          test -f website/.local/site/projects/sigil-minesweep/demo/index.html
          test -f website/.local/site/projects/sigil-todo/index.html
          test -f website/.local/site/projects/sigil-todo/demo/index.html
          test -f website/.local/site/spec/index.html
          test -f website/.local/site/assets/site.css
          test -f website/.local/site/site.json
          grep -Eq "Projects|Articles|Docs|Spec" website/.local/site/index.html
          grep -q "/${{ github.event.repository.name }}/projects/sigil-2048/demo/assets/" website/.local/site/projects/sigil-2048/demo/index.html
          grep -q "/${{ github.event.repository.name }}/projects/sigil-flashcards/demo/assets/" website/.local/site/projects/sigil-flashcards/demo/index.html
          grep -q "/${{ github.event.repository.name }}/projects/sigil-minesweep/demo/assets/" website/.local/site/projects/sigil-minesweep/demo/index.html
          grep -q "/${{ github.event.repository.name }}/projects/sigil-todo/demo/assets/" website/.local/site/projects/sigil-todo/demo/index.html

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/.local/site

  deploy-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - build-site
    permissions:
      pages: write
      id-token: write

    steps:
      - uses: actions/configure-pages@v5
      - uses: actions/deploy-pages@v4
