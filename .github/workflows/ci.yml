name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compiler-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          components: rustfmt

      - name: Install system Z3
        run: |
          sudo apt-get update
          sudo apt-get install -y libz3-dev pkg-config

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: true

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            language/compiler/target
          key: ${{ runner.os }}-cargo-system-z3-${{ hashFiles('language/compiler/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-system-z3-

      - name: Enable corepack pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@10.0.0 --activate

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Rust formatting
        run: cargo fmt --all --check --manifest-path language/compiler/Cargo.toml

      - name: Run compiler tests
        run: cargo test --manifest-path language/compiler/Cargo.toml --workspace --no-default-features

  todo-app:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1

      - name: Install system Z3
        run: |
          sudo apt-get update
          sudo apt-get install -y libz3-dev pkg-config

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: true

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            language/compiler/target
          key: ${{ runner.os }}-cargo-system-z3-${{ hashFiles('language/compiler/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-system-z3-

      - name: Enable corepack pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@10.0.0 --activate

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Sigil CLI
        run: cargo build --quiet --manifest-path language/compiler/Cargo.toml -p sigil-cli --no-default-features

      - name: Run Sigil todo tests
        run: language/compiler/target/debug/sigil test projects/todo-app/tests

      - name: Generate React todo bindings
        run: language/compiler/target/debug/sigil compile projects/todo-app/src/todoDomain.lib.sigil -o projects/todo-app/web/src/generated/todo-domain.ts

      - name: Build React todo app
        run: |
          cd projects/todo-app
          SIGIL_TODO_BASE=${sigilSiteBasePath:-/}projects/sigil-todo/demo/ pnpm exec vite build
